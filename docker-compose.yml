services:
  auth:
    image: ghcr.io/planara/planara-auth:latest
    container_name: svc-auth
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "8081:8081"
    command: ["--migrate"]
    environment:
      DbConnections__Postgres__ConnectionString: "User ID=postgres;Password=postgres;Host=postgres;Port=5432;Database=auth;Pooling=true;Include Error Detail=true"
      DbConnections__Redis__ConnectionString: "redis:6379"
      Jwt__Issuer: "planara-auth"
      Jwt__Audience: "planara"
      Jwt__SigningKey: "9b6d3b3c5a0d4f1f9a7e1c2d3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a"
      Jwt__AccessTokenMinutes: "15"
      Kafka__BootstrapServers: "kafka:29092"
      Kafka__ProducerTopics__UserCreated: "UserCreated"
      Kafka__ProducerTopics__UserDeleted: "UserDeleted"
      GraphQL__Name: "GraphQLSchema"
      
  accounts:
    image: ghcr.io/planara/planara-accounts:latest
    container_name: svc-accounts
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8082:8080"
      - "8083:8081"
    command: [ "--migrate" ]
    environment:
      DbConnections__Postgres__ConnectionString: "User ID=postgres;Password=postgres;Host=postgres;Port=5432;Database=accounts;Pooling=true;Include Error Detail=true"
      DbConnections__Redis__ConnectionString: "redis:6379"
      Jwt__Issuer: "planara-auth"
      Jwt__Audience: "planara"
      Jwt__SigningKey: "9b6d3b3c5a0d4f1f9a7e1c2d3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a"
      Jwt__AccessTokenMinutes: "15"
      Kafka__BootstrapServers: "kafka:29092"
      Kafka__ConsumerTopics__UserCreated: "UserCreated"
      Kafka__ConsumerTopics__UserDeleted: "UserDeleted"
      Kafka__ConsumerGroupId: "svc-accounts"
      GraphQL__Name: "GraphQLSchema"
      
  projects:
    image: ghcr.io/planara/planara-projects:latest
    container_name: svc-projects
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8084:8080"
      - "8085:8081"
    command: [ "--migrate" ]
    environment:
      DbConnections__Postgres__ConnectionString: "User ID=postgres;Password=postgres;Host=postgres;Port=5432;Database=projects;Pooling=true;Include Error Detail=true"
      DbConnections__Redis__ConnectionString: "redis:6379"
      Jwt__Issuer: "planara-auth"
      Jwt__Audience: "planara"
      Jwt__SigningKey: "9b6d3b3c5a0d4f1f9a7e1c2d3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a"
      Jwt__AccessTokenMinutes: "15"
      Kafka__BootstrapServers: "kafka:29092"
      Kafka__ConsumerTopics__UserDeleted: "UserDeleted"
      Kafka__ConsumerGroupId: "svc-projects"
      GraphQL__Name: "GraphQLSchema"
      
  files:
    image: ghcr.io/planara/planara-files:latest
    container_name: svc-files
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8086:8080"
      - "8087:8081"
    command: [ "--migrate" ]
    environment:
      DbConnections__Postgres__ConnectionString: "User ID=postgres;Password=postgres;Host=postgres;Port=5432;Database=files;Pooling=true;Include Error Detail=true"
      Jwt__Issuer: "planara-auth"
      Jwt__Audience: "planara"
      Jwt__SigningKey: "9b6d3b3c5a0d4f1f9a7e1c2d3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a"
      Jwt__AccessTokenMinutes: "15"
      Minio__Endpoint: "minio:9000"
      Minio__AccessKey: "minioadmin"
      Minio__SecretKey: "minioadmin"
      Minio__UseSsl: "false"
      Kafka__BootstrapServers: "kafka:29092"
      Kafka__ConsumerTopics__UserDeleted: "UserDeleted"
      Kafka__ConsumerGroupId: "svc-files"
      
  benchmarks:
    image: ghcr.io/planara/planara-benchmarks:latest
    container_name: svc-benchmarks
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8088:8080"
      - "8089:8081"
    command: [ "--migrate" ]
    environment:
      DbConnections__Postgres__ConnectionString: "User ID=postgres;Password=postgres;Host=postgres;Port=5432;Database=benchmarks;Pooling=true;Include Error Detail=true"
      DbConnections__Redis__ConnectionString: "redis:6379"
      Jwt__Issuer: "planara-auth"
      Jwt__Audience: "planara"
      Jwt__SigningKey: "9b6d3b3c5a0d4f1f9a7e1c2d3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a"
      Jwt__AccessTokenMinutes: "15"
      Kafka__BootstrapServers: "kafka:29092"
      Kafka__ConsumerTopics__UserDeleted: "UserDeleted"
      Kafka__ConsumerGroupId: "svc-benchmarks"
      GraphQL__Name: "GraphQLSchema"

volumes:
  pgdata:
  redis-data: