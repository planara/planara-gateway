name: release

on:
  pull_request:
    types: [closed]
    branches: [main]

env:
  IMAGE_NAME: planara-gateway
  BUILD_CONTEXT: ./src
  DOCKERFILE: ./src/Dockerfile

jobs:
  release:
    if: github.event.pull_request.merged == true

    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Decide bump from PR labels
        id: bump
        uses: actions/github-script@v7
        with:
          script: |
            const labels = (context.payload.pull_request.labels || []).map(l => l.name);
            const has = (x) => labels.includes(x);

            let bump = 'patch';

            if (has('no-release')) bump = 'false';
            else if (has('major')) bump = 'major';
            else if (has('minor')) bump = 'minor';
            else if (has('patch')) bump = 'patch';

            core.setOutput('value', bump);

      - name: Bump version and push tag
        id: tag_version
        if: steps.bump.outputs.value != 'false'
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: v
          default_bump: ${{ steps.bump.outputs.value }}

      - name: Set image variables
        id: vars
        if: steps.bump.outputs.value != 'false'
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          SHA="$(git rev-parse HEAD)"
          SHORT_SHA="${SHA::7}"
          VERSION="${{ steps.tag_version.outputs.new_version }}"

          echo "image=ghcr.io/${OWNER_LC}/${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        if: steps.bump.outputs.value != 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        if: steps.bump.outputs.value != 'false'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.bump.outputs.value != 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.bump.outputs.value != 'false'
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.vars.outputs.image }}:latest
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.version }}
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.sha }}
            ${{ steps.vars.outputs.image }}:sha-${{ steps.vars.outputs.short_sha }}